name: Build e Deploy (GitHub Pages)

on:
  # Publica ao alterar o código do app
  push:
    branches: [main]
  # Reprocessa as cartilhas diariamente (o repositório de dados é separado,
  # então o agendamento garante que novas cartilhas entrem sem intervenção)
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC = 06:00 em Brasília
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:
  # Permite disparo remoto via webhook do repositório de dados (opcional,
  # ver DEPLOY.md seção 5)
  repository_dispatch:
    types: [cartilhas-atualizadas]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema (pdftotext)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: pip install -r etl/requirements.txt

      - name: Baixar as cartilhas (clone raso do repositório de dados)
        run: git clone --depth 1 https://github.com/andresilvatorres85-bit/cartilhas /tmp/cartilhas

      - name: Rodar ETL (extrai projetos e divide PDFs)
        run: python etl/build.py --local-dir /tmp/cartilhas

      - name: Publicar relatório de build no log
        run: |
          echo "== build_report.json =="
          cat site/data/build_report.json

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
